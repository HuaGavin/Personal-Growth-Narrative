<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成长史 · 寻找真实的自己</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<!-- PDF.js 和 Mammoth 文档解析库 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<!-- Markdown 解析库 -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<style>
  /* 主题变量 - 暗色模式（默认） */
  :root {
    --bg: #0f0e0c;
    --bg2: #171612;
    --bg3: #1e1c17;
    --border: #2e2b24;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6530;
    --text: #e8e2d4;
    --text-dim: #8a8070;
    --text-muted: #504840;
    --user-bg: #1a1810;
    --ai-bg: #131210;
    --accent: #8b5e3c;
    --hover-bg: rgba(201, 168, 76, 0.1);
    --input-bg: #1e1c17;
    --shadow: rgba(0,0,0,0.3);
    --code-bg: #252320;
    --blockquote-border: var(--gold-dim);
  }

  /* 亮色模式 */
  body.light-mode {
    --bg: #fefaf5;
    --bg2: #ffffff;
    --bg3: #f5f2ef;
    --border: #e0dbd1;
    --gold: #b48c3c;
    --gold-light: #d6b15c;
    --gold-dim: #9e7a48;
    --text: #2c2a27;
    --text-dim: #6b6258;
    --text-muted: #a59c8f;
    --user-bg: #fef7e8;
    --ai-bg: #ffffff;
    --accent: #b48c3c;
    --hover-bg: rgba(180, 140, 60, 0.08);
    --input-bg: #ffffff;
    --shadow: rgba(0,0,0,0.05);
    --code-bg: #f5f2ef;
    --blockquote-border: var(--gold-dim);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 350;
    font-size: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* Header */
  .header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--gold);
    transition: all 0.2s;
  }

  .logo-mark svg {
    width: 22px;
    height: 22px;
    stroke: var(--gold);
    stroke-width: 1.5;
    fill: none;
  }

  .header-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .stage-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .stage-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold-dim);
    transition: background 0.3s;
  }

  .stage-dot.active { background: var(--gold); transform: scale(1.2); }

  /* 主题切换按钮 */
  .theme-toggle {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 30px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-dim);
    transition: all 0.2s;
    margin-left: 12px;
  }
  .theme-toggle:hover {
    border-color: var(--gold-dim);
    background: var(--hover-bg);
  }
  .theme-toggle svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
  }

  /* API Key Banner */
  .api-banner {
    background: var(--bg3);
    border-bottom: 1px solid var(--gold-dim);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .api-banner label {
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .api-input {
    flex: 1;
    background: var(--input-bg);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    padding: 5px 0;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-bottom-color: var(--gold-dim); }
  
  .api-input.has-content {
    color: var(--text);
  }

  .api-save {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold-dim);
    font-size: 11px;
    padding: 4px 14px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .api-save:hover { border-color: var(--gold); color: var(--gold); background: var(--hover-bg); }
  .api-save.saved { border-color: #4a7a4a; color: #4a7a4a; }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 5px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 28px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-wrapper + .message-wrapper { margin-top: 28px; }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .message-role {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
  }

  .message-role.ai { color: var(--gold-dim); }

  .message-line {
    width: 24px;
    height: 1px;
    background: var(--border);
  }

  .message-line.ai { background: var(--gold-dim); opacity: 0.5; }

  .message-body {
    background: var(--ai-bg);
    border-left: 2px solid var(--border);
    padding: 18px 24px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-weight: 350;
    border-radius: 0 8px 8px 0;
  }

  .message-body.user {
    background: var(--user-bg);
    border-left: 2px solid var(--gold-dim);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
  }

  .message-body.ai {
    border-left-color: var(--gold-dim);
  }

  /* Markdown 样式 */
  .message-body h1, .message-body h2, .message-body h3, .message-body h4 {
    font-family: 'Noto Serif SC', serif;
    color: var(--gold);
    margin: 20px 0 12px 0;
    font-weight: 500;
  }
  .message-body h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .message-body h2 { font-size: 20px; }
  .message-body h3 { font-size: 17px; }
  .message-body h4 { font-size: 15px; }

  .message-body p { margin: 12px 0; }
  .message-body p:first-child { margin-top: 0; }
  .message-body p:last-child { margin-bottom: 0; }

  .message-body strong {
    color: var(--gold-light);
    font-weight: 500;
  }

  .message-body em {
    color: var(--text-dim);
    font-style: italic;
  }

  .message-body ul, .message-body ol {
    margin: 12px 0;
    padding-left: 24px;
  }

  .message-body li {
    margin: 6px 0;
  }

  .message-body blockquote {
    border-left: 3px solid var(--blockquote-border);
    margin: 16px 0;
    padding: 12px 16px;
    background: var(--bg3);
    border-radius: 0 8px 8px 0;
    color: var(--text-dim);
  }

  .message-body blockquote p {
    margin: 0;
  }

  .message-body code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 14px;
    color: var(--gold-light);
  }

  .message-body pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
  }

  .message-body pre code {
    background: transparent;
    padding: 0;
    color: var(--text);
  }

  .message-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .message-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .message-body th, .message-body td {
    border: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
  }

  .message-body th {
    background: var(--bg3);
    color: var(--gold);
    font-weight: 500;
  }

  .message-body tr:nth-child(even) {
    background: var(--bg2);
  }

  .message-body a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-dim);
    transition: border-color 0.2s;
  }

  .message-body a:hover {
    border-bottom-color: var(--gold);
  }

  /* 文档折叠样式 */
  .doc-content-collapse {
    background: var(--bg3);
    border-radius: 6px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 14px;
    font-family: monospace;
    border-left: 2px solid var(--gold-dim);
  }
  .doc-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    color: var(--gold);
    font-size: 13px;
    font-weight: 400;
  }
  .doc-fulltext {
    display: none;
    white-space: pre-wrap;
    margin-top: 12px;
    color: var(--text-dim);
    max-height: 300px;
    overflow-y: auto;
    font-family: inherit;
  }
  .doc-fulltext.show { display: block; }

  /* Typing indicator - 思考状态 */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px;
    background: var(--ai-bg);
    border-left: 2px solid var(--gold-dim);
    border-radius: 0 8px 8px 0;
  }

  .thinking-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--gold-dim);
    border-radius: 50%;
    animation: thinkingSpin 0.8s linear infinite;
  }

  @keyframes thinkingSpin {
    to { transform: rotate(360deg); }
  }

  .thinking-text {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 350;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-dim);
    animation: typingPulse 1.4s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 18px 28px 22px;
    flex-shrink: 0;
  }

  .input-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 350;
    padding: 12px 18px;
    resize: none;
    outline: none;
    line-height: 1.55;
    min-height: 48px;
    max-height: 150px;
    transition: border-color 0.2s;
    overflow-y: auto;
    border-radius: 12px;
  }

  .input-box:focus { border-color: var(--gold-dim); }
  .input-box::placeholder { color: var(--text-muted); }

  .send-btn, .upload-btn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold-dim);
    width: 48px;
    height: 48px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    border-radius: 12px;
  }

  .send-btn:hover:not(:disabled), .upload-btn:hover:not(:disabled) {
    background: var(--gold-dim);
    color: var(--bg);
    border-color: var(--gold-dim);
  }

  .send-btn:disabled, .upload-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .send-btn svg, .upload-btn svg { width: 18px; height: 18px; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 12px;
    letter-spacing: 0.06em;
  }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 0.7s ease;
    width: 5%;
  }

  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
    border-radius: 20px;
  }

  .export-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); background: var(--hover-bg); }

  /* Welcome screen */
  .welcome {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 28px;
    animation: fadeUp 0.6s ease forwards;
  }

  .welcome-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 350;
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1.4;
    margin-bottom: 20px;
  }

  .welcome-title span { color: var(--gold); }

  .welcome-desc {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 32px;
    max-width: 560px;
  }

  .welcome-divider {
    width: 48px;
    height: 1px;
    background: var(--gold-dim);
    margin-bottom: 32px;
  }

  .welcome-steps {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 40px;
  }

  .welcome-step {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .step-num {
    font-family: 'Noto Serif SC', serif;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .start-btn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 14px;
    padding: 12px 36px;
    cursor: pointer;
    letter-spacing: 0.12em;
    transition: all 0.3s;
    font-family: 'Noto Serif SC', serif;
    font-weight: 400;
    border-radius: 40px;
  }

  .start-btn:hover {
    background: var(--gold-dim);
    color: var(--bg);
  }

  .drag-over {
    border: 2px dashed var(--gold);
    background-color: rgba(201, 168, 76, 0.08);
    transition: all 0.1s;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark" id="logoMark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 12V22" stroke="currentColor" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="header-title">个人成长史</div>
      <div class="header-sub">Personal Growth Narrative</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="stage-indicator">
      <div class="stage-dot active" id="dot1" title="准备"></div>
      <div class="stage-dot" id="dot2" title="阶段划分"></div>
      <div class="stage-dot" id="dot3" title="事件回顾"></div>
      <div class="stage-dot" id="dot4" title="整合分析"></div>
      <div class="stage-dot" id="dot5" title="总结报告"></div>
    </div>
    <button class="export-btn" onclick="exportChat()">导出对话</button>
    <button class="theme-toggle" id="themeToggle" title="切换亮色/暗色模式">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="1.8"/>
        <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="1.8"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="1.8"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.8"/>
        <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.8"/>
        <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.8"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="1.8"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="1.8"/>
      </svg>
    </button>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="api-banner" id="apiBanner">
  <label>DeepSeek API Key</label>
  <input type="password" class="api-input" id="apiKeyInput" placeholder="在此输入您的 DeepSeek API Key，例如：sk-xxxxxxxxxxxxx" />
  <button class="api-save" id="apiSaveBtn" onclick="saveApiKey()">保存并开始</button>
</div>

<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-title">
      你所经历的一切<br>都是<span>理解自己</span>的线索
    </div>
    <div class="welcome-divider"></div>
    <div class="welcome-desc">
      个人成长史书写，是一种通过系统回顾人生经历来深度了解自我的方法。
      你不需要有写作功底，只需要真实地说出你的故事。也可上传日记、笔记或成长文档，AI将协助你梳理脉络。
    </div>
    <div class="welcome-steps">
      <div class="welcome-step"><span class="step-num">01</span><span>划分你的人生阶段，为每个时期找到属于它的关键词</span></div>
      <div class="welcome-step"><span class="step-num">02</span><span>回顾每个阶段中影响最深的3-5件事，探索情绪与驱动力</span></div>
      <div class="welcome-step"><span class="step-num">03</span><span>完成每个阶段的总结，发现重复的模式与成长的弧线</span></div>
      <div class="welcome-step"><span class="step-num">04</span><span>最终，用你自己的成长史，回答"我是谁"这个问题</span></div>
    </div>
    <button class="start-btn" onclick="startConversation()">开始我的成长史 →</button>
  </div>
</div>

<div class="input-area" id="inputArea" style="display:none;">
  <div class="input-inner">
    <textarea class="input-box" id="userInput" placeholder="分享你的故事、回答或上传文档…" rows="1"
      onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
    <button class="upload-btn" id="uploadBtn" onclick="triggerFileUpload()" title="上传文档 (txt / word / pdf)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

// 增强版 SYSTEM PROMPT (融合多学科顾问角色 + 原有引导框架)

const SYSTEM_PROMPT = `# Role: 个人成长史书写与人生发展顾问

## Profile
 - language: 中文
 - description: 一位融合社会学、心理学、人类学等多学科视角的深度思考伙伴，致力于协助个体通过系统回顾生命历程，梳理个人发展脉络，发掘内在价值观与行为模式，并为现实生活挑战提供基于个人历史的洞察与策略。
 - background: 基于人类数千年文明史，尤其是现代社会个体发展经验的深度模型训练与知识整合，具备跨文化、跨时代的比较视野。
 - personality: 共情、敏锐、中立、启发式、尊重个体独特性、注重过程引导而非结论灌输。
 - expertise: 生命历程分析、叙事心理学、价值观澄清、行为模式识别、社会文化因素对个体发展的影响分析。

## Skills
 1. 叙事引导与重构：通过开放式提问引导回忆，协助意义诠释、时间线梳理与主题提炼。

## Rules
 - 用户中心：用户是个人历史的最终权威，我的角色是辅助者与催化剂。
 - 非评判性：对用户所有分享保持中立，营造安全环境。

## 引导流程框架（请严格遵循以下顺序）
### 第一步：建立信任与划分阶段
 - 先用温暖的方式欢迎用户，简短介绍这个旅程
 - 引导用户划分自己的人生阶段（建议6-8个，每个不少于3年）
 - 无论任何用户，都必须包含一个社会化前阶段作为第一个阶段，也就是普通人读小学前阶段，你给出用户的建议也必须包含这个阶段，如果用户划分阶段的时候没有设置这一阶段或者将这一阶段与其他阶段合并划分，需要跟用户强调其重要性，除非用户坚持这样划分。

### 第二步：逐阶段深度回顾（每个阶段）
对每个阶段，引导用户：
1. 选出3-5件影响最深的事件。
  进入到这一阶段提示用户如果用户无法会议起过往事件，可以主动跟你沟通。这时候你可以采取感官唤醒法（回忆小时候的感受记忆包含气味、颜色、声音等），场景再造法（闭上眼睛，试着想象一个你小时候的普通一天），情绪逆向法（回忆最快乐、最难过、最害怕的情绪），地点回忆法（回忆我小时候经常去的地方）等各种方式协助用户回忆事件。
  如果用户回忆的事件很多缺无法取舍什么是最重要的或者在不同阶段不知道如何定义重要，你需要从专业角度根据用户所处阶段和人生背景，利用分析当前阶段的心理结构和核心心理任务等方法，找到那些真正影响了用户的重要事件。
2. 对每件事依次探索以下问题，正式开始前将问题全盘展现给用户，告诉用户我们现在可以逐一讨论，但是建议用户采用自问自答的方式录音或录像，然后采用文本转语音的方式，将单个事件的文字稿发给你，你会帮助整理：
 事件基本回顾
   - 事件名称（简述）：
   - 发生时间与背景：
   - 记忆回顾：当时发生了什么？你具体做了什么？
 事件体验
   - 当时你的感受是什么？
   - 你当时的想法或信念是什么？
   - 这件事带给你的“情绪印记”（愤怒 / 自豪 / 被忽视 / 成就感 …）？
 核心驱动力分析 (价值观/动机)
   - 是什么在驱动你去做这件事？是**好奇心**、**成就感**、**帮助他人**、**追求完美**、**渴望认可**、**反抗约束**，还是别的？(这是发现“具身价值观”的关键，请务必深挖。)*  
 影响与意义
   - 这件事对你产生了哪些持久的影响？
   - 它让你形成了哪些信念或行为模式？（例如“必须努力才配得上爱”“我很享受带领别人”）
   - 这些信念在今天还适用吗？是否需要更新？
 个人成长视角
   - 从今天的视角回看，你会对当时的自己说什么？
   - 如果重来一次，你会有什么不同的选择或反应？
   - 你从这段经历中看到了自己怎样的天赋、价值或特质？

3. 先询问用户这一阶段事件回顾是否结束，如果还有事件可以让用户继续回顾，直至用户明确已经回顾完一个阶段以后，分析总结用户该阶段的所有事件，并给出阶段分析报告（基于以下 5 个问题）
  1. **这一阶段，我最突出的性格特征是什么？**
  2. **我最常重复的行为或情绪模式是什么？**
  3. **我最感到充实/活着的瞬间是什么？**
  4. **这一阶段，我被哪些外部期待所塑造？**
  5. **我想保留哪些部分？想告别哪些部分？**
用户必须完成一个阶段的所有事件回顾并且产出阶段报告后才能进入到下一阶段，否则仅在当前阶段引导用户继续进行事件回顾
用户只有完成所有阶段的事件回顾后才可以进入到下一步，在中间可以基于阶段本身跟用户讨论，中间跟用户的对话需要不偏离主题太远，当偏离主题后要及时将用户拉回事件回顾。

### 第三步：跨阶段整合
必须完成所有阶段的总结后后，引导用户发现（你先从事件中总结结论，然后给通过向用户表述事实引导用户自己表达出来）：
- 反复出现的关键词（行动中的价值观）
- 反复出现的情绪主题（用户的内在动力或阻力）
- 人际/工作/应对压力的生命模式
- 社会化之前的天性特质（非常重要）
  回溯挑战： 用户上小学之前是一个什么样的孩子？自然展现出的活力、创造力、求知欲、内向/外向倾向或强烈的求胜欲是什么？ 
  对当下的意义： 这些被重新发现的天性，是否在用户当前的工作/学习或爱好中以某种形式（例如创造力的爆发、解决问题的热情）展现出来？它们是否被所从事的职业压抑了？ 
- 成长弧线（一句话总结人生主线）
  "我这一生似乎一直在学习如何……（例如：让自己被看见 / 在安全中冒险 / 平衡独立与连接）。"

### 第四步：最终总结
完成第三步以后，温柔的恭喜用户，并且提示用户可以生成最终总结，是否现在生成，如果可以生成，根据用户的对话历史、重要事件、阶段汇总、跨阶段整合，也就是前三步的所有内容，回答以下问题并生成报告
提炼3个核心价值观、3个优势天赋、3个恐惧陷阱、1句话描述未来想成为的人。

## 对话原则
 - 每次只问1-2个问题，节奏舒缓。
 - 重视情绪真实性而非记忆准确性。
 - 温暖简洁，适时反馈用户模式。
 - 必须遵循rules，并严格按照引导流程框架一步一步引导和协助用户完成，除非用户明确表达不遵循或者跳过
 - 当用户分享文档或长内容时，主动提取其中的关键成长线索进行回应。`;

let apiKey = localStorage.getItem('ds_api_key') || '';
let conversationHistory = [];
let isLoading = false;
let currentStage = 0;
let messageCount = 0;

// PDF.js worker

// 主题切换

}

// API Key 管理
function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const btn = document.getElementById('apiSaveBtn');
  apiKey = input.value.trim();
  if (apiKey) {
    localStorage.setItem('ds_api_key', apiKey);

function startConversationWithApiKey() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('inputArea').style.display = 'block';
  
  conversationHistory = [];
  currentStage = 0;
  messageCount = 0;
  
  const welcomeMessage = '我已输入api key，我们开始吧';

  setTimeout(() => {

window.addEventListener('load', () => {
  const apiKeyInput = document.getElementById('apiKeyInput');
  if (apiKey) {
    apiKeyInput.value = apiKey;
    apiKeyInput.classList.add('has-content');
  }
  
  initDragAndDrop();
});

// 拖拽上传
function initDragAndDrop() {
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => document.body.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); }));
  document.body.addEventListener('dragover', () => document.body.classList.add('drag-over'));
  document.body.addEventListener('dragleave', () => document.body.classList.remove('drag-over'));
  document.body.addEventListener('drop', (e) => {
    document.body.classList.remove('drag-over');
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      processUploadedFile(e.dataTransfer.files[0]);
    }
  });
}

function triggerFileUpload() { document.getElementById('fileInput').click(); }
document.getElementById('fileInput').addEventListener('change', async (e) => {
  if (e.target.files && e.target.files.length) await processUploadedFile(e.target.files[0]);
  e.target.value = '';
});

async function processUploadedFile(file) {
  if (!apiKey) { alert('请先配置 API Key'); return; }
  if (isLoading || isUploading) { alert('请稍后再上传'); return; }
  if (file.size > 5 * 1024 * 1024) { alert('文件需小于5MB'); return; }
  isUploading = true;
  const uploadBtn = document.getElementById('uploadBtn');
  uploadBtn.disabled = true;
  let extracted = '';
  const ext = file.name.split('.').pop().toLowerCase();
  try {
    if (ext === 'txt') extracted = await file.text();
    else if (ext === 'pdf') {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(t => t.str).join(' ') + '\n';
      }
      extracted = text;
    } else if (ext === 'docx') {
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      extracted = result.value;
    } else throw new Error('不支持的文件类型');
    if (!extracted.trim()) throw new Error('文档无文字内容');
    const maxLen = 25000;
    let content = extracted.length > maxLen ? extracted.slice(0, maxLen) + '\n\n（文档过长已截取）' : extracted;
    const userMsg = `📄 我上传了文档《${file.name}》，内容如下：\n\n${content}\n\n请基于此内容，结合我的个人成长史进行回应或引导。`;
    await sendUserMessageFromText(userMsg);
  } catch (err) {
    addMessage('ai', `❌ 文档解析失败：${err.message}`);
  } finally {
    isUploading = false;
    uploadBtn.disabled = false;
  }
}

async function sendUserMessageFromText(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  messageCount++;
  updateProgress();
  await sendToAI(text);
}

function startConversation() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('inputArea').style.display = 'block';
  sendToAI('');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  if (!apiKey) { alert('请先配置 API Key'); return; }
  addMessage('user', text);
  input.value = '';
  autoResize(input);
  messageCount++;
  updateProgress();
  await sendToAI(text);
}

async function sendToAI(userText) {
  if (!apiKey && userText !== '') return;
  if (!apiKey && userText === '') {
    addMessage('ai', '请先在上方输入 DeepSeek API Key，保存后点击"开始我的成长史"。');
    return;
  }
  isLoading = true;
  setSendDisabled(true);
  if (userText) conversationHistory.push({ role: 'user', content: userText });
  const typingId = showTyping();
  try {
    const messages = conversationHistory.length ? conversationHistory : [{ role: 'user', content: '请开始引导' }];
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'deepseek-reasoner',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages],
        max_tokens: 1300,
        temperature: 0.85,
        stream: false
      })
    });
    if (!res.ok) throw new Error(`API错误 ${res.status}`);
    const data = await res.json();
    const aiText = data.choices?.[0]?.message?.content || '无回复';
    conversationHistory.push({ role: 'assistant', content: aiText });
    // 先移除加载动画，再添加消息，确保动画一直显示到内容准备就绪
    removeTyping(typingId);
    addMessage('ai', aiText);
    updateStageDots();
  } catch (err) {
    removeTyping(typingId);
    addMessage('ai', `连接错误：${err.message}`);
  }
  isLoading = false;
  setSendDisabled(false);
}

function addMessage(role, text) {
  const container = document.getElementById('chatContainer');
  const wrapper = document.createElement('div'); wrapper.className = 'message-wrapper';
  const meta = document.createElement('div'); meta.className = 'message-meta';
  const roleLabel = document.createElement('span'); roleLabel.className = `message-role ${role}`;
  roleLabel.textContent = role === 'ai' ? '成长史引导师' : '你';
  const line = document.createElement('div'); line.className = `message-line ${role}`;
  meta.appendChild(roleLabel); meta.appendChild(line);
  const body = document.createElement('div'); body.className = `message-body ${role}`;
  
  if (role === 'user' && text.includes('📄 我上传了文档《') && text.length > 700) {
    const div = document.createElement('div'); div.className = 'doc-content-collapse';
    div.innerHTML = `<div class="doc-summary" onclick="toggleDocContent(this)">📄 文档内容较长，点击展开/折叠</div><div class="doc-fulltext">${escapeHtml(text)}</div>`;
    body.appendChild(div);
  } else if (role === 'ai') {
    // AI 消息使用 Markdown 渲染
    body.innerHTML = renderMarkdown(text);
  } else {
    // 用户消息保持纯文本
    text.split('\n').filter(p => p.trim()).forEach(p => { const para = document.createElement('p'); para.textContent = p; body.appendChild(para); });
  }
  
  wrapper.appendChild(meta); wrapper.appendChild(body);
  container.appendChild(wrapper);
  setTimeout(() => container.scrollTop = container.scrollHeight, 50);
}

// Markdown 渲染函数
function renderMarkdown(text) {
  // 先处理 emoji，将常用的文本表情转换为 emoji
  text = addEmojis(text);
  
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false,
      sanitize: false
    });
    return marked.parse(text);
  }
  // 如果 marked 未加载，使用简单的格式化
  return simpleMarkdown(text);
}

// 智能添加 emoji 函数
function addEmojis(text) {
  // 只在特定关键词处添加 emoji，避免过度使用
  const emojiMap = [
    { pattern: /^(#{1,6}\s*)(重要|注意|提醒|警告)/gm, emoji: '⚠️ ' },
    { pattern: /^(#{1,6}\s*)(总结|结论|核心|要点)/gm, emoji: '💡 ' },
    { pattern: /^(#{1,6}\s*)(开始|第一步|首先)/gm, emoji: '🚀 ' },
    { pattern: /^(#{1,6}\s*)(完成|成功|结束)/gm, emoji: '✅ ' },
    { pattern: /^(#{1,6}\s*)(问题|疑问|困惑)/gm, emoji: '❓ ' },
    { pattern: /^(#{1,6}\s*)(建议|推荐|方案)/gm, emoji: '💭 ' },
    { pattern: /^(#{1,6}\s*)(反思|回顾|思考)/gm, emoji: '🤔 ' },
    { pattern: /^(#{1,6}\s*)(成长|进步|突破)/gm, emoji: '🌱 ' },
    { pattern: /^(#{1,6}\s*)(情感|情绪|感受)/gm, emoji: '💝 ' },
    { pattern: /^(#{1,6}\s*)(目标|梦想|愿景)/gm, emoji: '⭐ ' },
  ];
  
  emojiMap.forEach(({ pattern, emoji }) => {
    text = text.replace(pattern, (match, p1, p2) => {
      // 检查是否已经有 emoji，避免重复
      if (match.includes('⚠️') || match.includes('💡') || match.includes('🚀') || 
          match.includes('✅') || match.includes('❓') || match.includes('💭') ||
          match.includes('🤔') || match.includes('🌱') || match.includes('💝') ||
          match.includes('⭐')) {
        return match;
      }
      return p1 + emoji + p2;
    });
  });
  
  return text;
}

// 简单的 Markdown 解析器（备用）
function simpleMarkdown(text) {
  // 先添加 emoji
  text = addEmojis(text);
  
  return text
    // 代码块
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    // 行内代码
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // 粗体
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    // 斜体
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    // 标题
    .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
    // 引用
    .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
    // 无序列表
    .replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>')
    .replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>')
    // 有序列表
    .replace(/^\d+\. (.*$)/gim, '<ol><li>$1</li></ol>')
    // 链接
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    // 分隔线
    .replace(/^\-\-\-+/gim, '<hr>')
    .replace(/^\*\*\*+/gim, '<hr>')
    // 段落
    .split('\n\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
window.toggleDocContent = (el) => { const full = el.parentElement.querySelector('.doc-fulltext'); if(full) full.classList.toggle('show'); };
function showTyping() { 
  const id = 'typing-'+Date.now(); 
  const wrapper = document.createElement('div'); 
  wrapper.className='message-wrapper'; 
  wrapper.id=id; 
  wrapper.innerHTML='<div class="message-meta"><span class="message-role ai">成长史引导师</span></div><div class="typing-indicator"><div class="thinking-spinner"></div><span class="thinking-text">正在思考</span><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>'; 
  document.getElementById('chatContainer').appendChild(wrapper); 
  setTimeout(()=>document.getElementById('chatContainer').scrollTop=document.getElementById('chatContainer').scrollHeight,10); 
  return id; 
}
function removeTyping(id) { const el = document.getElementById(id); if(el) el.remove(); }
function setSendDisabled(d) { document.getElementById('sendBtn').disabled = d; document.getElementById('uploadBtn').disabled = d || isUploading; }
function handleKeyDown(e) { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(ta) { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,150)+'px'; }
function updateProgress() { const pct = Math.min(5 + messageCount * 2.2, 95); document.getElementById('progressFill').style.width = pct+'%'; }
function updateStageDots() { const th=[0,5,12,20,28]; const ns = th.filter(t=>messageCount>=t).length-1; if(ns>currentStage){ currentStage=ns; for(let i=1;i<=5;i++) document.getElementById('dot'+i).classList.toggle('active', i<=currentStage+1); } }
function exportChat() { if(!conversationHistory.length){ alert('暂无对话'); return; } let content = '# 我的个人成长史对话记录\n\n'; conversationHistory.forEach(msg=>{ content+=`**${msg.role==='user'?'我':'引导师'}**\n\n${msg.content}\n\n---\n\n`; }); const blob = new Blob([content], {type:'text/markdown'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`成长史_${new Date().toISOString().slice(0,10)}.md`; a.click(); URL.revokeObjectURL(a.href); }
</script>
